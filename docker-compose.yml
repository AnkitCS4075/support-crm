version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: support-crm-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./support_crm.db
      - ENVIRONMENT=production
      - DEBUG=false
    volumes:
      - ./backend:/app
      - backend_data:/app/data
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    networks:
      - support-crm-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: support-crm-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - support-crm-network
    depends_on:
      - backend

volumes:
  backend_data:

networks:
  support-crm-network:
    driver: bridge
